<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Design Portfolio</title>
  <meta name="description" content="Switchable web design concepts for property and hospitality brands." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Cormorant+Garamond:wght@500;600;700&family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-design="property">

  <!-- Design switcher (top right, collapsible). Options are filled in by script.js -->
  <div class="switcher is-collapsed" role="group" aria-label="Choose a design">
    <button type="button" class="switcher__toggle" id="switcherToggle" aria-expanded="false" aria-label="Show design options">
      <span class="switcher__dot" aria-hidden="true"></span>
      <span class="switcher__current">Design</span>
      <span class="switcher__chevron" aria-hidden="true">›</span>
    </button>
    <div class="switcher__options" id="switcherOptions"></div>
  </div>

  <!-- Each design lives in its own file under /designs and is rendered here -->
  <div id="designRoot"></div>

  <!-- Design registry + the individual designs (add a new design = new file + one line below) -->
  <script src="designs/registry.js"></script>
  <script src="designs/property.js"></script>
  <script src="designs/hospitality.js"></script>
  <script src="designs/aurora.js"></script>
  <script src="designs/startup.js"></script>

  <!-- The "middle" that combines the designs above into the page -->
  <script src="script.js"></script>
</body>
</html>
